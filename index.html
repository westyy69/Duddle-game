<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DUEL JUMP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --p1: #00e5ff;
    --p2: #ff3d71;
    --gold: #ffd700;
    --text: #e0e0f0;
    --dim: #666680;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    touch-action: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    padding: 20px;
    transition: opacity .3s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .logo {
    font-family: 'Teko', sans-serif;
    font-size: clamp(48px, 12vw, 90px);
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--p1), var(--p2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(0,229,255,.3));
    line-height: 1;
  }

  .subtitle {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 14px 32px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    min-width: 220px;
    text-align: center;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--p1), var(--p2));
    opacity: 0;
    transition: opacity .2s;
  }
  .btn:hover::before { opacity: .15; }
  .btn:hover { border-color: var(--p1); color: var(--p1); }
  .btn:active { transform: scale(.97); }
  .btn.primary { border-color: var(--p1); color: var(--p1); }
  .btn.danger { border-color: var(--p2); color: var(--p2); }

  input[type=text] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    width: 100%;
    max-width: 380px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: 1px;
  }
  input[type=text]:focus { border-color: var(--p1); }

  .link-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 11px 14px;
    width: 100%;
    max-width: 380px;
    font-size: 11px;
    color: var(--p1);
    word-break: break-all;
    line-height: 1.5;
    user-select: all;
  }
  .copy-btn {
    width: 100%;
    max-width: 380px;
    background: transparent;
    border: 1px solid var(--p1);
    color: var(--p1);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 10px;
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }
  .copy-btn:hover { background: rgba(0,229,255,.1); }
  .copy-btn:active { transform: scale(.97); }
  .copy-btn.copied { border-color: #4cff91; color: #4cff91; }

  .status-msg {
    font-size: 13px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 1px;
  }

  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── GAME AREA ── */
  #gameWrap {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
  }
  #gameWrap.hidden { display: none; }

  #hud {
    height: 48px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    gap: 8px;
  }
  .hud-player {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Teko', sans-serif;
    font-size: 20px;
  }
  .hud-score {
    font-size: 28px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
  }
  .hud-name { font-size: 15px; letter-spacing: 1px; }
  .hud-p1 { color: var(--p1); }
  .hud-p2 { color: var(--p2); }

  .hud-center {
    text-align: center;
    font-family: 'Teko', sans-serif;
  }
  .hud-round { font-size: 13px; color: var(--dim); letter-spacing: 2px; }
  .hud-timer { font-size: 24px; color: var(--gold); }

  #canvas {
    flex: 1;
    display: block;
    width: 100%;
  }

  /* ── MOBILE CONTROLS ── */
  #controls {
    display: none;
    height: 130px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    user-select: none;
  }
  @media (pointer: coarse) { #controls { display: flex; } }

  .ctrl-left, .ctrl-right {
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex: 1;
    padding: 10px;
  }

  .ctrl-btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .ctrl-btn svg { pointer-events: none; }
  .ctrl-btn:active, .ctrl-btn.active {
    background: rgba(0,229,255,.15);
    border-color: var(--p1);
    transform: scale(.93);
  }
  .ctrl-btn.shoot-btn:active, .ctrl-btn.shoot-btn.active {
    background: rgba(255,61,113,.2);
    border-color: var(--p2);
  }
  .ctrl-divider {
    width: 1px;
    background: var(--border);
    height: 80%;
    align-self: center;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  #overlay .big-text {
    font-family: 'Teko', sans-serif;
    font-size: clamp(60px, 15vw, 120px);
    font-weight: 700;
    line-height: 1;
  }
  #overlay .sub-text {
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 3px;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(42,42,58,.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,42,58,.3) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: -1;
  }

  .sep { width: 100%; max-width: 380px; height: 1px; background: var(--border); }
  .small { font-size: 11px; color: var(--dim); text-align: center; }
</style>
</head>
<body>

<!-- ── MENU SCREEN ── -->
<div class="screen" id="menuScreen">
  <div class="logo">DUEL<br>JUMP</div>
  <div class="subtitle">2 players · 10 rounds · first kill wins</div>
  <div class="sep"></div>
  <button class="btn primary" onclick="showScreen('hostScreen')">СОЗДАТЬ ИГРУ</button>
  <button class="btn" onclick="showScreen('joinScreen')">ПОДКЛЮЧИТЬСЯ</button>
  <div class="sep"></div>
  <div class="small">PC: WASD / стрелки + Enter / Ctrl · Mobile: кнопки</div>
</div>

<!-- ── HOST SCREEN ── -->
<div class="screen hidden" id="hostScreen">
  <div class="logo" style="font-size:clamp(32px,8vw,60px)">ХОСТ</div>
  <div class="status-msg pulse" id="hostStatus">Создаю комнату...</div>
  <div class="link-box hidden" id="linkBox"></div>
  <button class="copy-btn hidden" id="copyBtn" onclick="copyLink()">⎘ КОПИРОВАТЬ ССЫЛКУ</button>
  <div class="status-msg" id="hostWait"></div>
  <button class="btn" onclick="showScreen('menuScreen');cancelHost()">← НАЗАД</button>
</div>

<!-- ── JOIN SCREEN ── -->
<div class="screen hidden" id="joinScreen">
  <div class="logo" style="font-size:clamp(32px,8vw,60px)">JOIN</div>
  <div class="subtitle">вставьте ссылку или код</div>
  <input type="text" id="joinInput" placeholder="https://... или код" />
  <button class="btn primary" onclick="joinGame()">ПОДКЛЮЧИТЬСЯ</button>
  <div class="status-msg" id="joinStatus"></div>
  <button class="btn" onclick="showScreen('menuScreen');cancelJoin()">← НАЗАД</button>
</div>

<!-- ── GAME WRAP ── -->
<div id="gameWrap" class="hidden">
  <div id="hud">
    <div class="hud-player hud-p1">
      <span class="hud-score" id="score1">0</span>
      <span class="hud-name">P1</span>
    </div>
    <div class="hud-center">
      <div class="hud-round" id="roundLabel">ROUND 1 / 10</div>
      <div class="hud-timer" id="timerLabel">–</div>
    </div>
    <div class="hud-player hud-p2" style="flex-direction:row-reverse">
      <span class="hud-score" id="score2">0</span>
      <span class="hud-name">P2</span>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-left">
      <div class="ctrl-btn" id="btnLeft"
        ontouchstart="ctrlDown('left')" ontouchend="ctrlUp('left')" ontouchcancel="ctrlUp('left')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="ctrl-btn" id="btnDown"
        ontouchstart="ctrlDown('down')" ontouchend="ctrlUp('down')" ontouchcancel="ctrlUp('down')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ctrl-btn" id="btnRight"
        ontouchstart="ctrlDown('right')" ontouchend="ctrlUp('right')" ontouchcancel="ctrlUp('right')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-right">
      <div class="ctrl-btn" id="btnJump"
        ontouchstart="ctrlDown('jump')" ontouchend="ctrlUp('jump')" ontouchcancel="ctrlUp('jump')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>
      </div>
      <div class="ctrl-btn shoot-btn" id="btnShoot"
        ontouchstart="ctrlShootDown()" ontouchend="ctrlShootUp()" ontouchcancel="ctrlShootUp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="7"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- ── OVERLAY ── -->
<div id="overlay" class="hidden">
  <div class="big-text" id="overlayBig"></div>
  <div class="sub-text" id="overlaySub"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  WebRTC P2P via public signaling (PeerJS CDN-free approach)
//  We use a tiny manual SDP exchange via a relay URL encoded in the link
// ══════════════════════════════════════════════════════

// We'll use PeerJS from CDN for signaling simplicity
const PEERJS_CDN = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';

let peer, conn;
let isHost = false;
let myId = null;

// ── Load PeerJS dynamically ──
function loadPeerJS(cb) {
  if (window.Peer) { cb(); return; }
  const s = document.createElement('script');
  s.src = PEERJS_CDN;
  s.onload = cb;
  s.onerror = () => alert('Не удалось загрузить PeerJS. Проверьте интернет.');
  document.head.appendChild(s);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── HOST ──
function showHostScreen() {
  showScreen('hostScreen');
  document.getElementById('hostStatus').textContent = 'Создаю комнату...';
  document.getElementById('hostStatus').classList.add('pulse');
  document.getElementById('linkBox').classList.add('hidden');
  document.getElementById('hostWait').textContent = '';
  loadPeerJS(initHost);
}
document.getElementById('hostScreen').querySelector('button[onclick*="host"]') // unused — done via btn

function initHost() {
  peer = new Peer(undefined, { debug: 0 });
  isHost = true;
  peer.on('open', id => {
    myId = id;
    const url = location.origin + location.pathname + '#join=' + id;
    const box = document.getElementById('linkBox');
    box.textContent = url;
    box.classList.remove('hidden');
    document.getElementById('copyBtn').classList.remove('hidden');
    document.getElementById('hostStatus').textContent = 'Ссылка готова:';
    document.getElementById('hostStatus').classList.remove('pulse');
    document.getElementById('hostWait').textContent = '⏳ ожидание игрока...';
    document.getElementById('hostWait').classList.add('pulse');
  });
  peer.on('connection', c => {
    conn = c;
    setupConn();
    document.getElementById('hostWait').textContent = '✓ игрок подключился!';
    document.getElementById('hostWait').classList.remove('pulse');
    setTimeout(() => startGame(), 800);
  });
  peer.on('error', e => {
    document.getElementById('hostStatus').textContent = 'Ошибка: ' + e.type;
  });
}

function copyLink() {
  const text = document.getElementById('linkBox').textContent;
  navigator.clipboard.writeText(text).catch(() => {});
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ СКОПИРОВАНО';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '⎘ КОПИРОВАТЬ ССЫЛКУ'; btn.classList.remove('copied'); }, 2000);
}

function cancelHost() { if (peer) { peer.destroy(); peer = null; } }

// ── JOIN ──
function joinGame() {
  const val = document.getElementById('joinInput').value.trim();
  let hostId = val;
  // extract from URL
  const m = val.match(/[#?&]join=([a-zA-Z0-9_-]+)/);
  if (m) hostId = m[1];
  if (!hostId) { document.getElementById('joinStatus').textContent = 'Введите код или ссылку'; return; }

  document.getElementById('joinStatus').textContent = 'Подключаюсь...';
  loadPeerJS(() => {
    peer = new Peer(undefined, { debug: 0 });
    isHost = false;
    peer.on('open', () => {
      conn = peer.connect(hostId, { reliable: true });
      setupConn();
      conn.on('open', () => {
        document.getElementById('joinStatus').textContent = '✓ подключено!';
        setTimeout(() => startGame(), 500);
      });
      conn.on('error', e => {
        document.getElementById('joinStatus').textContent = 'Ошибка подключения';
      });
    });
    peer.on('error', e => {
      document.getElementById('joinStatus').textContent = 'Ошибка: ' + e.type;
    });
  });
}

function cancelJoin() { if (peer) { peer.destroy(); peer = null; } }

// ── check URL for auto-join ──
window.addEventListener('load', () => {
  const m = location.hash.match(/join=([a-zA-Z0-9_-]+)/);
  if (m) {
    showScreen('joinScreen');
    document.getElementById('joinInput').value = location.hash.slice(1); // show full hash
    document.getElementById('joinStatus').textContent = 'Код вставлен — нажмите ПОДКЛЮЧИТЬСЯ';
  }
});

// wire host button
document.querySelector('#menuScreen .btn.primary').addEventListener('click', showHostScreen);

// ══════════════════════════════════════════════════════
//  CONNECTION LAYER
// ══════════════════════════════════════════════════════
function setupConn() {
  conn.on('data', onNetData);
  conn.on('close', () => {
    showOverlay('ДИСКОННЕКТ', 'соединение потеряно', '#ff3d71', 0);
  });
}

function send(obj) {
  if (conn && conn.open) conn.send(obj);
}

// ══════════════════════════════════════════════════════
//  GAME ENGINE
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Game config
const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const SPEED = 4.5;
const BULLET_SPEED = 10;
const PLAYER_W = 22;
const PLAYER_H = 30;
const PLAT_H = 10;
const TOTAL_ROUNDS = 10;
const COUNTDOWN = 3;

let W, H;
let platforms = [];
let bullets = [];
let players = [];
let myIndex = 0; // 0=p1(host) 1=p2(joiner)
let scores = [0, 0];
let round = 0;
let phase = 'countdown'; // countdown | playing | roundEnd | gameOver
let countdownVal = COUNTDOWN;
let countdownTimer = 0;
let roundActive = false;
let animId;
let lastTime = 0;

// Input state
const keys = {};
const touch = { left:false, right:false, jump:false, down:false };
let shootPressed = false;   // edge-trigger: true only for one frame
let shootPressedTouch = false; // mobile tap flag

// ── PLATFORMS (symmetric) ──
function buildPlatforms(W, H) {
  const ps = [];
  const groundY = H - 2;
  // ground — special, can't fall through
  ps.push({ x:0, y: groundY, w: W, h: 4, solid: true, ground: true });

  // symmetric layout
  const midX = W / 2;
  const rows = [
    { y: 0.78, spans: [0.05, 0.25, 0.55, 0.75] },
    { y: 0.60, spans: [0.10, 0.32, 0.50, 0.72] },
    { y: 0.44, spans: [0.15, 0.35, 0.47, 0.67] },
    { y: 0.28, spans: [0.05, 0.28, 0.55, 0.78] },
    { y: 0.14, spans: [0.18, 0.38, 0.44, 0.64] },
  ];
  const PW = W * 0.18;

  rows.forEach(row => {
    row.spans.forEach(xFrac => {
      ps.push({ x: xFrac * W, y: row.y * H, w: PW, h: PLAT_H, solid: true, ground: false });
    });
  });
  return ps;
}

// ── PLAYER ──
function makePlayer(x, y, color, facing) {
  return {
    x, y, vx: 0, vy: 0,
    w: PLAYER_W, h: PLAYER_H,
    onGround: false,
    color,
    facing, // 1=right -1=left
    dead: false,
    canFallThrough: false,
    fallCooldown: 0,
  };
}

function resetRound() {
  bullets = [];
  const margin = W * 0.12;
  players[0] = makePlayer(margin, H * 0.5, '#00e5ff', 1);
  players[1] = makePlayer(W - margin - PLAYER_W, H * 0.5, '#ff3d71', -1);
  players[0].onGround = false;
  players[1].onGround = false;
}

function startGame() {
  myIndex = isHost ? 0 : 1;
  scores = [0, 0];
  round = 0;
  showScreen('menuScreen'); // hide all screens
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('gameWrap').classList.remove('hidden');
  resize();
  platforms = buildPlatforms(W, H);
  nextRound();
  if (animId) cancelAnimationFrame(animId);
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

function nextRound() {
  round++;
  updateHUD();
  resetRound();
  phase = 'countdown';
  countdownVal = COUNTDOWN;
  countdownTimer = 0;
  roundActive = false;
  showOverlay(String(countdownVal), `РАУНД ${round}`, '#ffd700', 0);
}

function updateHUD() {
  document.getElementById('score1').textContent = scores[0];
  document.getElementById('score2').textContent = scores[1];
  document.getElementById('roundLabel').textContent = `ROUND ${round} / ${TOTAL_ROUNDS}`;
}

// ── GAME LOOP ──
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  draw();
  animId = requestAnimationFrame(loop);
}

function update(dt) {
  if (phase === 'countdown') {
    countdownTimer += dt * (1000 / 60) / 1000;
    if (countdownTimer >= 1) {
      countdownTimer = 0;
      countdownVal--;
      if (countdownVal <= 0) {
        hideOverlay();
        phase = 'playing';
        roundActive = true;
      } else {
        showOverlay(String(countdownVal), `РАУНД ${round}`, '#ffd700', 0);
      }
    }
    return;
  }
  if (phase !== 'playing') return;

  // My input
  const me = players[myIndex];
  if (!me.dead) {
    const left  = keys['ArrowLeft']  || keys['a'] || keys['A'] || touch.left;
    const right = keys['ArrowRight'] || keys['d'] || keys['D'] || touch.right;
    const jump  = keys['ArrowUp']    || keys['w'] || keys['W'] || keys[' '] || touch.jump;
    const down  = keys['ArrowDown']  || keys['s'] || keys
    
    if (left)  { me.vx = -SPEED; me.facing = -1; }
    else if (right) { me.vx = SPEED; me.facing = 1; }
    else me.vx *= 0.75;

    if (jump && me.onGround) { me.vy = JUMP_FORCE; me.onGround = false; }

    me.canFallThrough = down && me.onGround;

    // Shoot — edge trigger only (one shot per keydown/tap, no hold)
    const wantShoot = shootPressed || shootPressedTouch;
    if (wantShoot && (!me.shootCooldown || me.shootCooldown <= 0)) {
      fireBullet(myIndex);
      me.shootCooldown = 12;
      send({ type: 'shoot', idx: myIndex, x: me.x, y: me.y, facing: me.facing });
    }
    // consume immediately — never fire again until next press
    shootPressed = false;
    shootPressedTouch = false;
    if (me.shootCooldown > 0) me.shootCooldown -= dt;

    // Send my state
    send({ type: 'state', idx: myIndex, x: me.x, y: me.y, vx: me.vx, vy: me.vy, facing: me.facing });
  }

  // Physics both players
  players.forEach((p, i) => {
    if (p.dead) return;
    p.vy += GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Wall bounce
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x + p.w > W) { p.x = W - p.w; p.vx = 0; }

    // Fall through bottom = death (except ground)
    if (p.y > H + 50) { p.dead = true; killPlayer(1 - i); return; }

    // Platform collisions
    p.onGround = false;
    platforms.forEach(pl => {
      if (!pl.solid) return;
      if (pl.ground && p.canFallThrough) return;
      if (!pl.ground && p.canFallThrough) return;
      if (p.x + p.w > pl.x && p.x < pl.x + pl.w) {
        const prevBottom = (p.y + p.vy * -dt) + p.h;
        if (p.vy >= 0 && prevBottom <= pl.y + 2 && p.y + p.h >= pl.y && p.y + p.h <= pl.y + pl.h + 12) {
          p.y = pl.y - p.h;
          p.vy = 0;
          p.onGround = true;
          p.canFallThrough = false;
        }
      }
    });
  });

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) return false;

    // Hit enemy
    const enemy = players[1 - b.owner];
    if (!enemy.dead && rectsOverlap(b, enemy, 8, 8, enemy.w, enemy.h)) {
      if (!enemy.dead) {
        enemy.dead = true;
        killPlayer(b.owner);
        return false;
      }
    }
    // Platform collision
    for (const pl of platforms) {
      if (b.x > pl.x && b.x < pl.x + pl.w && b.y > pl.y && b.y < pl.y + pl.h) return false;
    }
    return true;
  });
}

function rectsOverlap(b, p, bw, bh, pw, ph) {
  return b.x < p.x + pw && b.x + bw > p.x && b.y < p.y + ph && b.y + bh > p.y;
}

function fireBullet(ownerIdx) {
  const p = players[ownerIdx];
  bullets.push({
    x: p.x + p.w / 2,
    y: p.y + p.h / 2,
    vx: p.facing * BULLET_SPEED,
    vy: 0,
    owner: ownerIdx,
    color: ownerIdx === 0 ? '#00e5ff' : '#ff3d71',
  });
}

function killPlayer(winnerIdx) {
  if (phase !== 'playing') return;
  phase = 'roundEnd';
  scores[winnerIdx]++;
  updateHUD();

  const color = winnerIdx === 0 ? '#00e5ff' : '#ff3d71';
  const name = winnerIdx === 0 ? 'P1' : 'P2';

  if (round >= TOTAL_ROUNDS || scores[winnerIdx] > TOTAL_ROUNDS / 2) {
    phase = 'gameOver';
    showOverlay(name + ' ПОБЕДИЛ!', `${scores[0]} — ${scores[1]}`, color, 4000);
    setTimeout(() => {
      showScreen('menuScreen');
      document.getElementById('gameWrap').classList.add('hidden');
      hideOverlay();
      peer && peer.destroy();
    }, 5000);
  } else {
    showOverlay(name + ' УБИЛ!', `${scores[0]} — ${scores[1]}`, color, 1800);
    setTimeout(() => { if (round < TOTAL_ROUNDS) nextRound(); }, 2000);
  }
}

// ── NETWORK ──
function onNetData(data) {
  if (!data || !data.type) return;
  if (data.type === 'state') {
    const p = players[data.idx];
    if (!p) return;
    // Remote player state — update with received values
    p.x = data.x; p.y = data.y;
    p.vx = data.vx; p.vy = data.vy;
    p.facing = data.facing;
  } else if (data.type === 'shoot') {
    // Remote bullet
    const p = players[data.idx];
    if (p && !p.dead) {
      p.x = data.x; p.y = data.y; p.facing = data.facing;
      fireBullet(data.idx);
    }
  }
}

// ── DRAW ──
const COLORS = ['#00e5ff', '#ff3d71'];

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(42,42,58,0.5)';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // Platforms
  platforms.forEach(pl => {
    if (pl.ground) {
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(pl.x, pl.y, pl.w, 2);
    } else {
      ctx.fillStyle = '#1e1e30';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      // glow top edge
      ctx.fillStyle = 'rgba(100,100,180,0.5)';
      ctx.fillRect(pl.x, pl.y, pl.w, 2);
    }
  });

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();
    // trail
    ctx.fillStyle = b.color + '55';
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 2, b.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Players
  players.forEach((p, i) => {
    if (p.dead) return;
    const col = COLORS[i];
    ctx.save();
    ctx.shadowColor = col;
    ctx.shadowBlur = 16;

    // Body
    ctx.fillStyle = col + 'cc';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    // Outline
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x, p.y, p.w, p.h);

    // Eyes / direction indicator
    ctx.fillStyle = '#fff';
    const eyeX = p.facing > 0 ? p.x + p.w - 7 : p.x + 4;
    ctx.beginPath();
    ctx.arc(eyeX, p.y + 10, 3, 0, Math.PI*2);
    ctx.fill();

    // Gun barrel
    const gunY = p.y + p.h * 0.4;
    const gunX = p.facing > 0 ? p.x + p.w : p.x;
    ctx.strokeStyle = col;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(gunX, gunY);
    ctx.lineTo(gunX + p.facing * 10, gunY);
    ctx.stroke();

    // Player label
    ctx.fillStyle = col;
    ctx.font = 'bold 9px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.fillText(`P${i+1}`, p.x + p.w/2, p.y - 6);

    // MY indicator
    if (i === myIndex) {
      ctx.fillStyle = '#fff4';
      ctx.fillText('▼', p.x + p.w/2, p.y - 14);
    }

    ctx.restore();
  });
}

// ── OVERLAY ──
function showOverlay(big, sub, color, autohide) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlayBig').textContent = big;
  document.getElementById('overlayBig').style.color = color;
  document.getElementById('overlaySub').textContent = sub;
  ov.classList.remove('hidden');
  if (autohide > 0) setTimeout(hideOverlay, autohide);
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// ── RESIZE ──
function resize() {
  const wrap = document.getElementById('gameWrap');
  const ctrlH = window.matchMedia('(pointer: coarse)').matches ? 130 : 0;
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight - 48 - ctrlH;
  if (platforms.length) platforms = buildPlatforms(W, H);
}
window.addEventListener('resize', resize);

// ── KEYBOARD ──
const SHOOT_KEYS = new Set(['Enter', 'Control', 'z', 'Z', 'x', 'X']);
const shootKeyHeld = new Set();

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (SHOOT_KEYS.has(e.key)) {
    if (!shootKeyHeld.has(e.key)) {
      // first press — set edge flag
      shootPressed = true;
      shootKeyHeld.add(e.key);
    }
    e.preventDefault();
    return;
  }
  keys[e.key] = true;
});
document.addEventListener('keyup', e => {
  shootKeyHeld.delete(e.key);
  keys[e.key] = false;
});

// ── TOUCH CONTROLS ──
function ctrlDown(k) {
  touch[k] = true;
  document.getElementById({left:'btnLeft',right:'btnRight',jump:'btnJump',down:'btnDown'}[k])?.classList.add('active');
}
function ctrlUp(k) {
  touch[k] = false;
  document.getElementById({left:'btnLeft',right:'btnRight',jump:'btnJump',down:'btnDown'}[k])?.classList.remove('active');
}
function ctrlShootDown() {
  shootPressedTouch = true;
  document.getElementById('btnShoot')?.classList.add('active');
}
function ctrlShootUp() {
  document.getElementById('btnShoot')?.classList.remove('active');
}

// Prevent touch scroll
document.getElementById('controls')?.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
